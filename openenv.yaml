# openenv.yaml — OpenEnv Benchmark Specification
# Validates with: openenv validate

name: pharma-b2b-quotation
version: "1.0.0"
description: >
  A professional B2B simulation of pharmaceutical medicine quotation.
  Distributors must source medications from brands, verify suppliers,
  and calculate optimal margins for downstream business customers.

benchmark: pharma-b2b

tasks:
  - name: quotation
    description: >
      Full B2B workflow: sourcing brand, selecting supplier,
      confirming availability, calculating 8%+ margin, and finalizing.
    grader:
      type: reward
      min: -20.0
      max: 16.0
      pass_threshold: 0.8

  - name: brand-selection
    description: >
      Select the correct (cheapest valid) brand and supplier for
      pharmaceutical distribution requirements without web search.
    grader:
      type: reward
      min: -5.0
      max: 5.0
      pass_threshold: 0.8

  - name: margin-check
    description: >
      Given a pre-selected pharma brand, calculate a sell price
      ensuring business profitability (8% minimum margin).
    grader:
      type: reward
      min: -10.0
      max: 13.0
      pass_threshold: 0.8

environment:
  type: http
  reset_endpoint: /reset
  step_endpoint: /step
  state_endpoint: /state
  host: "0.0.0.0"
  port: 7860

actions:
  - search_brands:<generic_name>
  - select_brand:<brand_name>
  - select_supplier:<supplier_name>
  - request_confirmation
  - calculate_price:<number>
  - finalize

observation:
  type: text
  fields:
    - order
    - selected_brand
    - selected_supplier
    - calculated_price
    - supplier_confirmed
    - action_history
    - score

reward:
  range: [-20.0, 16.0]
  normalized: false
  normalize_method: min_max_clamp

metadata:
  author: Nyor AI Team
  license: MIT
  tags:
    - pharmaceutical
    - supply-chain
    - b2b-quotation
    - llm-agent
    - openenv
